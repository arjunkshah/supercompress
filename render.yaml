# Render.com — official public API
# Connect repo at https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: supercompress-api
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: HARBOR_DEMO
        value: "0"
      - key: PORT
        value: "8000"
      - key: SUPERCOMPRESS_JWT_SECRET
        generateValue: true
      - key: NEBIUS_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      # API_KEY + PROJECT_ID enable token verify without service account
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
