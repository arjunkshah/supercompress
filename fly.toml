# Fly.io production API (Docker — same image as Render blueprint)
app = "supercompress-api"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[checks]
  [checks.health]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/v1/health"
    port = 8000
    timeout = "10s"
    type = "http"
