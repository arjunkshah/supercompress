name: Publish API Docker image
on:
  push:
    branches: [main]
    paths:
      - "supercompress/**"
      - "deploy/**"
      - "checkpoints/**"
      - "pyproject.toml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Train checkpoint (CI)
        run: |
          pip install -e .
          supercompress-train --fast
          test -f checkpoints/default.pt

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/supercompress-api:latest
            ghcr.io/${{ github.repository_owner }}/supercompress-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
